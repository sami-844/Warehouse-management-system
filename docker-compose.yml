version: "3.8"

services:

  # ─── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://warehouse_user:${DB_PASSWORD}@db:5432/warehouse
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - CORS_ORIGINS=*
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ─── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.warehouse-frontend.rule=Host(`almumayzatrad.com`) || Host(`www.almumayzatrad.com`)"
      - "traefik.http.routers.warehouse-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.warehouse-frontend.tls=true"
      - "traefik.http.routers.warehouse-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.warehouse-frontend.loadbalancer.server.port=80"

volumes:
  postgres_data: